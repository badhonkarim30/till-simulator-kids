<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supermarket Till Simulator</title>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://unpkg.com/@zxing/library@0.20.0"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 1rem;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .mode-toggle {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .btn-mode {
            padding: 1rem 2rem;
            border: none;
            border-radius: 0.75rem;
            font-size: 1.125rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-mode.active {
            background: white;
            color: #7c3aed;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            transform: scale(1.05);
        }

        .btn-mode.inactive {
            background: #a855f7;
            color: white;
        }

        .btn-mode:hover {
            transform: scale(1.05);
        }

        .content {
            display: none;
        }

        .content.active {
            display: block;
        }

        .card {
            background: white;
            border-radius: 1rem;
            padding: 2rem;
            box-shadow: 0 20px 25px rgba(0, 0, 0, 0.1);
            margin-bottom: 1.5rem;
        }

        h2 {
            font-size: 1.875rem;
            color: #1f2937;
            margin-bottom: 1.5rem;
        }

        h3 {
            font-size: 1.25rem;
            color: #1f2937;
            margin-bottom: 1rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        input {
            padding: 1rem;
            border: 2px solid #e5e7eb;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: #7c3aed;
        }

        .btn {
            padding: 1rem;
            border: none;
            border-radius: 0.75rem;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-large {
            width: 100%;
            padding: 1.5rem;
            font-size: 1.25rem;
        }

        .btn-scan {
            background: linear-gradient(to right, #3b82f6, #1d4ed8);
            color: white;
            width: 100%;
        }

        .btn-scan:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.3);
        }

        .btn-proceed {
            background: linear-gradient(to right, #9333ea, #ec4899);
            color: white;
            width: 100%;
        }

        .btn-proceed:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(147, 51, 234, 0.3);
        }

        .btn-add {
            background: linear-gradient(to right, #10b981, #059669);
            color: white;
            width: 100%;
        }

        .btn-add:hover {
            transform: scale(1.02);
        }

        .btn-payment {
            background: linear-gradient(to right, #4ade80, #22c55e);
            color: white;
            padding: 1.5rem;
            font-size: 1.5rem;
            font-weight: black;
            width: 100%;
            margin-bottom: 0.5rem;
        }

        .btn-payment:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(34, 197, 94, 0.3);
        }

        .btn-back {
            background: #9ca3af;
            color: white;
            width: 100%;
        }

        .btn-back:hover {
            background: #6b7280;
        }

        .btn-small {
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
        }

        .btn-print {
            background: #3b82f6;
            color: white;
            margin-right: 0.5rem;
        }

        .btn-print:hover {
            background: #1d4ed8;
        }

        .btn-delete {
            background: #ef4444;
            color: white;
        }

        .btn-delete:hover {
            background: #dc2626;
        }

        .btn-remove {
            background: #ef4444;
            color: white;
        }

        .btn-remove:hover {
            background: #dc2626;
        }

        .basket-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to right, #f0fdf4, #dbeafe);
            padding: 1.5rem;
            border-radius: 0.5rem;
            border: 2px solid #86efac;
            margin-bottom: 0.75rem;
        }

        .basket-item-info h3 {
            font-size: 1.125rem;
            font-weight: bold;
            color: #1f2937;
            margin: 0;
        }

        .basket-item-info p {
            font-size: 0.875rem;
            color: #6b7280;
            margin: 0.5rem 0 0 0;
        }

        .basket-item-price {
            color: #059669;
            font-weight: bold;
            font-size: 1.25rem;
        }

        .total-section {
            border-top: 4px solid #d8b4fe;
            padding-top: 1.5rem;
            margin-top: 1.5rem;
        }

        .total-label {
            color: #6b7280;
            font-size: 1.125rem;
            margin-bottom: 0.5rem;
        }

        .total-amount {
            font-size: 3rem;
            font-weight: black;
            background: linear-gradient(to right, #9333ea, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1.5rem;
        }

        .payment-section {
            text-align: center;
        }

        .payment-amount {
            background: linear-gradient(to right, #f3e8ff, #fce7f3);
            padding: 1.5rem;
            border-radius: 0.75rem;
            margin-bottom: 2rem;
        }

        .payment-label {
            color: #6b7280;
            margin-bottom: 0.5rem;
        }

        .payment-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .payment-options {
            font-size: 1.25rem;
            font-weight: bold;
            color: #1f2937;
            margin-bottom: 1rem;
        }

        .product-item {
            background: linear-gradient(to right, #fef3c7, #fef08a);
            padding: 1.5rem;
            border-radius: 0.5rem;
            border: 2px solid #fde047;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .product-info h3 {
            font-size: 1.25rem;
            font-weight: bold;
            color: #1f2937;
            margin: 0 0 0.5rem 0;
        }

        .product-price {
            color: #9333ea;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }

        .product-barcode {
            font-size: 0.75rem;
            color: #6b7280;
            font-family: monospace;
        }

        .product-actions {
            display: flex;
            gap: 0.5rem;
        }

        .empty-message {
            text-align: center;
            color: #9ca3af;
            font-size: 1.25rem;
            padding: 2rem;
        }

        .hidden {
            display: none;
        }

        .loading {
            text-align: center;
            color: #667eea;
            font-weight: bold;
            padding: 1rem;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .barcode-input-section {
            background: linear-gradient(to right, #dbeafe, #e0e7ff);
            padding: 1.5rem;
            border-radius: 0.75rem;
            border: 3px solid #3b82f6;
            margin-bottom: 1.5rem;
        }

        .barcode-input-label {
            font-size: 1.125rem;
            font-weight: bold;
            color: #1f2937;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
        }

        .barcode-icon {
            font-size: 1.5rem;
            margin-right: 0.5rem;
        }

        .input-with-button {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .input-with-button input {
            width: 100%;
            font-size: 1.125rem;
            padding: 1rem;
            border: 2px solid #e5e7eb;
            border-radius: 0.5rem;
        }

        .button-row {
            display: flex;
            gap: 0.5rem;
        }

        .input-with-button button {
            flex: 1;
            padding: 1.25rem;
            background: linear-gradient(to right, #3b82f6, #1d4ed8);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-weight: bold;
            cursor: pointer;
            font-size: 1.125rem;
        }

        .input-with-button button:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(59, 130, 246, 0.3);
        }

        .scan-status {
            padding: 1rem;
            border-radius: 0.5rem;
            margin-top: 1rem;
            font-weight: bold;
            text-align: center;
        }

        .status-success {
            background: #dcfce7;
            color: #166534;
            border: 2px solid #86efac;
        }

        .status-loading {
            background: #dbeafe;
            color: #1e40af;
            border: 2px solid #93c5fd;
        }

        .status-error {
            background: #fee2e2;
            color: #991b1b;
            border: 2px solid #fca5a5;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="mode-toggle">
            <button class="btn-mode active" onclick="switchMode('cashier')">🛒 Cashier Mode</button>
            <button class="btn-mode inactive" onclick="switchMode('admin')">⚙️ Admin Setup</button>
        </div>

        <!-- Cashier Mode -->
        <div id="cashier" class="content active">
            <!-- Barcode Scanner Card -->
            <div class="card">
                <h2>🔍 Scan Items</h2>
                <div class="barcode-input-section">
                    <div class="barcode-input-label">
                        <span class="barcode-icon">📦</span>
                        Enter or scan barcode number
                    </div>
                    <div class="input-with-button">
                        <input type="text" id="barcode-input" placeholder="12345678901234" maxlength="14" onkeypress="if(event.key === 'Enter') scanBarcode()">
                        <div class="button-row">
                            <button onclick="scanBarcode()">🔍 Scan</button>
                            <button onclick="toggleCamera()" id="camera-btn">📷 Camera</button>
                        </div>
                    </div>
                    <div id="camera-container" class="hidden" style="margin-top: 1rem;">
                        <video id="video" style="width: 100%; border-radius: 0.5rem; border: 2px solid #3b82f6;"></video>
                        <button onclick="stopCamera()" style="width: 100%; padding: 0.75rem; background: #ef4444; color: white; border: none; border-radius: 0.5rem; font-weight: bold; margin-top: 0.5rem;">Close Camera</button>
                    </div>
                    <div id="scan-status"></div>
                </div>
            </div>

            <!-- Basket Card -->
            <div class="card">
                <h2>🛍️ Shopping Basket</h2>
                <div id="basket-items"></div>
                <div id="empty-basket" class="empty-message">Scan items to add them</div>
                <div id="total-section" class="total-section hidden">
                    <div class="total-label">Total</div>
                    <div class="total-amount" id="total-display">£0.00</div>
                    <button class="btn btn-proceed btn-large" onclick="goToPayment()">Proceed to Payment</button>
                </div>
            </div>
        </div>

        <!-- Payment Mode -->
        <div id="payment" class="content">
            <div class="card payment-section">
                <h2>💳 Payment Method</h2>
                <div class="payment-amount">
                    <div class="payment-label">Amount Due</div>
                    <div class="total-amount" id="payment-total">£0.00</div>
                </div>
                <div class="payment-options">Select Cash Payment</div>
                <div class="payment-grid" id="payment-buttons"></div>
                <button class="btn btn-back" onclick="backToBasket()">Back to Basket</button>
            </div>
        </div>

        <!-- Admin Mode -->
        <div id="admin" class="content">
            <!-- Add Product Card -->
            <div class="card">
                <h2>Add New Product</h2>
                <div class="input-group">
                    <input type="text" id="product-name" placeholder="Product Name (e.g. Milk, Bread)">
                    <input type="text" id="product-barcode" placeholder="Barcode number (optional)">
                    <input type="number" id="product-price" placeholder="Price in pounds (e.g. 1.50)" step="0.01">
                    <button class="btn btn-add btn-large" onclick="addProduct()">➕ Add Product</button>
                </div>
            </div>

            <!-- Products List Card -->
            <div class="card">
                <h2>📦 Your Products</h2>
                <div id="products-list"></div>
            </div>
        </div>
    </div>

    <script>
        // State
        let products = JSON.parse(localStorage.getItem('tillProducts')) || [
            { id: 1, name: 'Tesco Milk 1L', price: 1.50, barcode: '5000000000000' },
            { id: 2, name: 'Hovis Bread Loaf', price: 1.20, barcode: '5000000000001' },
            { id: 3, name: 'Pink Lady Apples 1kg', price: 2.50, barcode: '5000000000002' },
        ];
        
        let basket = [];
        let audioContext = null;
        let lastScan = '';

        // Audio beep
        function playBeep() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            const ctx = audioContext;
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.frequency.value = 800;
            osc.type = 'sine';
            gain.gain.setValueAtTime(0.3, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
            osc.start(ctx.currentTime);
            osc.stop(ctx.currentTime + 0.1);
        }

        // Fetch product from Open Food Facts API
        async function fetchProductFromAPI(barcode) {
            const statusEl = document.getElementById('scan-status');
            statusEl.textContent = '⏳ Looking up product...';
            statusEl.className = 'scan-status status-loading';

            try {
                const response = await fetch(`https://world.openfoodfacts.org/api/v0/product/${barcode}.json`);
                const data = await response.json();
                
                if (data.status === 1 && data.product) {
                    const product = data.product;
                    const price = parseFloat(product.price) || (Math.random() * 3 + 0.5);
                    
                    return {
                        id: Math.random(),
                        name: product.product_name || product.brands || 'Unknown Product',
                        price: price,
                        barcode: barcode,
                        apiData: true,
                        brand: product.brands
                    };
                }
                return null;
            } catch (err) {
                console.log('API lookup failed');
                return null;
            }
        }

        // Mode switching
        function switchMode(mode) {
            const buttons = document.querySelectorAll('.btn-mode');
            buttons.forEach(btn => {
                if (mode === 'cashier' && btn.textContent.includes('Cashier')) {
                    btn.classList.add('active');
                    btn.classList.remove('inactive');
                } else if (mode === 'admin' && btn.textContent.includes('Admin')) {
                    btn.classList.add('active');
                    btn.classList.remove('inactive');
                } else {
                    btn.classList.add('inactive');
                    btn.classList.remove('active');
                }
            });

            const contents = document.querySelectorAll('.content');
            contents.forEach(content => content.classList.remove('active'));
            
            if (mode === 'cashier') {
                document.getElementById('cashier').classList.add('active');
                document.getElementById('barcode-input').focus();
            } else if (mode === 'admin') {
                document.getElementById('admin').classList.add('active');
                renderProducts();
            }
        }

        // Scanner
        async function scanBarcode() {
            const barcode = document.getElementById('barcode-input').value.trim();
            if (!barcode) {
                alert('Please enter a barcode number');
                return;
            }
            
            const statusEl = document.getElementById('scan-status');
            
            if (barcode === lastScan) {
                statusEl.textContent = '⏸️ Already scanned';
                statusEl.className = 'scan-status status-error';
                setTimeout(() => statusEl.textContent = '', 2000);
                return;
            }

            lastScan = barcode;
            document.getElementById('barcode-input').value = '';
            document.getElementById('barcode-input').focus();

            // Check local products first
            let product = products.find(p => p.barcode === barcode);
            
            // If not found locally, try API
            if (!product) {
                product = await fetchProductFromAPI(barcode);
            }

            if (product) {
                playBeep();
                basket.push({ ...product, cartId: Date.now() });
                
                statusEl.textContent = `✓ Added: ${product.name}`;
                statusEl.className = 'scan-status status-success';
                
                renderBasket();
                
                setTimeout(() => {
                    statusEl.textContent = '';
                    lastScan = '';
                }, 2000);
            } else {
                statusEl.textContent = '❌ Product not found';
                statusEl.className = 'scan-status status-error';
                
                setTimeout(() => {
                    statusEl.textContent = '';
                    lastScan = '';
                }, 2000);
            }
        }

        // Basket
        function renderBasket() {
            const container = document.getElementById('basket-items');
            const emptyMsg = document.getElementById('empty-basket');
            const totalSection = document.getElementById('total-section');
            
            if (basket.length === 0) {
                container.innerHTML = '';
                emptyMsg.classList.remove('hidden');
                totalSection.classList.add('hidden');
                return;
            }
            
            emptyMsg.classList.add('hidden');
            totalSection.classList.remove('hidden');
            
            let html = '';
            basket.forEach(item => {
                const brand = item.brand ? `<p>Brand: ${item.brand}</p>` : '';
                html += `
                    <div class="basket-item">
                        <div class="basket-item-info">
                            <h3>${item.name}</h3>
                            ${brand}
                            <p>Barcode: ${item.barcode}</p>
                        </div>
                        <div style="text-align: right;">
                            <div class="basket-item-price">£${item.price.toFixed(2)}</div>
                            <button class="btn btn-remove btn-small" onclick="removeFromBasket(${item.cartId})">Remove</button>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
            
            const total = basket.reduce((sum, item) => sum + item.price, 0);
            document.getElementById('total-display').textContent = '£' + total.toFixed(2);
        }

        function removeFromBasket(cartId) {
            basket = basket.filter(item => item.cartId !== cartId);
            renderBasket();
        }

        function goToPayment() {
            const total = basket.reduce((sum, item) => sum + item.price, 0);
            document.getElementById('payment-total').textContent = '£' + total.toFixed(2);
            
            const buttons = document.getElementById('payment-buttons');
            const paymentOptions = [5, 10, 20, 50].filter(opt => opt >= Math.ceil(total));
            
            let html = '';
            paymentOptions.forEach(amount => {
                html += `<button class="btn btn-payment" onclick="processCash(${amount})">£${amount}</button>`;
            });
            
            buttons.innerHTML = html;
            
            document.getElementById('cashier').classList.remove('active');
            document.getElementById('payment').classList.add('active');
        }

        function backToBasket() {
            document.getElementById('payment').classList.remove('active');
            document.getElementById('cashier').classList.add('active');
        }

        function processCash(amount) {
            const total = basket.reduce((sum, item) => sum + item.price, 0);
            const change = (amount - total).toFixed(2);
            alert(`Payment successful!\nChange: £${change}`);
            basket = [];
            renderBasket();
            backToBasket();
        }

        // Admin
        function addProduct() {
            const name = document.getElementById('product-name').value.trim();
            const barcode = document.getElementById('product-barcode').value.trim() || `500000${Math.random().toString().slice(2, 9)}`;
            const price = parseFloat(document.getElementById('product-price').value);
            
            if (!name || !price || price <= 0) {
                alert('Please enter valid product details');
                return;
            }
            
            const newId = Math.max(...products.map(p => p.id), 0) + 1;
            
            products.push({
                id: newId,
                name: name,
                price: price,
                barcode: barcode
            });
            
            localStorage.setItem('tillProducts', JSON.stringify(products));
            
            document.getElementById('product-name').value = '';
            document.getElementById('product-barcode').value = '';
            document.getElementById('product-price').value = '';
            
            renderProducts();
        }

        function deleteProduct(id) {
            products = products.filter(p => p.id !== id);
            localStorage.setItem('tillProducts', JSON.stringify(products));
            renderProducts();
        }

        function printBarcode(product) {
            const printWindow = window.open('', '', 'width=400,height=300');
            printWindow.document.write(`
                <html>
                    <head>
                        <title>Print Barcode</title>
                        <style>
                            body { text-align: center; padding: 20px; font-family: Arial; }
                            .barcode-item { margin: 30px 0; }
                            h3 { margin: 10px 0; }
                            svg { max-width: 300px; }
                        </style>
                    </head>
                    <body>
                        <div class="barcode-item">
                            <h3>${product.name}</h3>
                            <svg id="barcode"></svg>
                            <p style="font-weight: bold;">£${product.price.toFixed(2)}</p>
                        </div>
                        <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"><\/script>
                        <script>
                            JsBarcode("#barcode", "${product.barcode}", { format: "CODE128" });
                        <\/script>
                    </body>
                </html>
            `);
            printWindow.document.close();
            setTimeout(() => printWindow.print(), 250);
        }

        function renderProducts() {
            const container = document.getElementById('products-list');
            
            if (products.length === 0) {
                container.innerHTML = '<p class="empty-message">No products yet. Add one above.</p>';
                return;
            }

            let html = '';
            products.forEach(product => {
                html += `
                    <div class="product-item">
                        <div class="product-info">
                            <h3>${product.name}</h3>
                            <div class="product-price">£${product.price.toFixed(2)}</div>
                            <div class="product-barcode">📦 ${product.barcode}</div>
                        </div>
                        <div class="product-actions">
                            <button class="btn btn-print btn-small" onclick="printBarcode({id: ${product.id}, name: '${product.name.replace(/'/g, "\\'")}', price: ${product.price}, barcode: '${product.barcode}'})">🖨️ Print</button>
                            <button class="btn btn-delete btn-small" onclick="deleteProduct(${product.id})">✕</button>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }

        // Initialize
        renderBasket();
        renderProducts();

        // Camera variables
        let cameraActive = false;
        let cameraStream = null;
        let codeReader = null;

        // Toggle camera
        async function toggleCamera() {
            if (!cameraActive) {
                startCamera();
            } else {
                stopCamera();
            }
        }

        // Start camera
        async function startCamera() {
            try {
                const cameraContainer = document.getElementById('camera-container');
                const video = document.getElementById('video');
                
                console.log('Starting camera...');
                
                cameraContainer.classList.remove('hidden');
                document.getElementById('camera-btn').textContent = '📷 Stop Camera';
                document.getElementById('barcode-input').disabled = true;

                // Get camera stream
                cameraStream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: 'environment',
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }
                });

                video.srcObject = cameraStream;
                video.play();
                cameraActive = true;

                // Initialize ZXing code reader
                const ZXing = window.ZXing;
                codeReader = new ZXing.BrowserMultiFormatReader();
                
                console.log('Camera started, beginning barcode scan...');

                // Start continuous decoding
                codeReader.decodeFromVideoElement(video, (result, err) => {
                    if (result) {
                        const barcode = result.getText();
                        console.log('Barcode detected:', barcode);
                        document.getElementById('barcode-input').value = barcode;
                        setTimeout(() => scanBarcode(), 100);
                    }
                    if (err && !(err instanceof ZXing.NotFoundException)) {
                        console.log(err);
                    }
                });
            } catch (err) {
                console.error('Camera error:', err);
                alert('Camera Error: ' + err.message + '\n\nPlease check:\n1. Camera permissions are granted\n2. Another app isn\'t using the camera\n3. Try a different browser');
                stopCamera();
            }
        }

        // Stop camera
        function stopCamera() {
            console.log('Stopping camera...');
            
            if (codeReader) {
                codeReader.reset();
                codeReader = null;
            }
            
            if (cameraStream) {
                cameraStream.getTracks().forEach(track => track.stop());
                cameraStream = null;
            }

            document.getElementById('camera-container').classList.add('hidden');
            cameraActive = false;
            document.getElementById('camera-btn').textContent = '📷 Camera';
            document.getElementById('barcode-input').disabled = false;
            document.getElementById('barcode-input').focus();
        }
    </script>
</body>
</html>
