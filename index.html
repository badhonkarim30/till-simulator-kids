<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karim's Corner Shop</title>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Nunito', 'Segoe UI', sans-serif; background: linear-gradient(160deg, #ff9a9e 0%, #fecfef 25%, #a8edea 55%, #fed6e3 80%, #ffecd2 100%); min-height: 100vh; padding: 1rem; }
        .container { max-width: 800px; margin: 0 auto; }

        /* Shop header */
        .shop-header { text-align: center; margin-bottom: 1.25rem; background: white; border-radius: 2rem; padding: 1.25rem 1rem; border: 4px solid #fbbf24; box-shadow: 0 6px 0 #f59e0b; }
        .shop-header h1 { font-size: 2rem; font-weight: 900; background: linear-gradient(to right, #f43f5e, #f97316, #eab308, #22c55e, #3b82f6, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .shop-header p { color: #6b7280; font-size: 0.875rem; margin-top: 0.15rem; font-weight: 700; }

        /* Mode toggle */
        .mode-toggle { display: flex; gap: 1rem; justify-content: center; margin-bottom: 1.5rem; }
        .btn-mode { padding: 0.875rem 2rem; border: 3px solid transparent; border-radius: 2rem; font-weight: 900; cursor: pointer; font-size: 1rem; font-family: inherit; transition: transform 0.1s; }
        .btn-mode:active { transform: scale(0.95); }
        .btn-mode.active { background: white; color: #7c3aed; border-color: #7c3aed; box-shadow: 0 4px 0 #5b21b6; }
        .btn-mode.inactive { background: #c084fc; color: white; border-color: #a855f7; box-shadow: 0 4px 0 #7e22ce; }

        .content { display: none; }
        .content.active { display: block; }

        /* Cards */
        .card { background: white; border-radius: 1.75rem; padding: 1.5rem; margin-bottom: 1.25rem; border: 3px solid #e5e7eb; box-shadow: 0 6px 0 rgba(0,0,0,0.08); }
        .card-scan    { border-color: #60a5fa; box-shadow: 0 6px 0 #3b82f6; }
        .card-basket  { border-color: #34d399; box-shadow: 0 6px 0 #10b981; }
        .card-payment { border-color: #f472b6; box-shadow: 0 6px 0 #ec4899; }
        .card-admin   { border-color: #fbbf24; box-shadow: 0 6px 0 #f59e0b; }

        h2 { font-size: 1.5rem; font-weight: 900; color: #1f2937; margin-bottom: 1.25rem; }
        .input-group { display: flex; flex-direction: column; gap: 0.875rem; }
        input { padding: 0.875rem 1rem; border: 3px solid #e5e7eb; border-radius: 1rem; font-size: 1rem; font-family: inherit; font-weight: 700; }
        input:focus { outline: none; border-color: #a78bfa; background: #faf5ff; }

        /* Buttons base */
        .btn { padding: 1rem; border: none; border-radius: 1.25rem; font-weight: 900; cursor: pointer; font-size: 1rem; font-family: inherit; transition: transform 0.1s; }
        .btn:active { transform: scale(0.96); }
        .btn-large { width: 100%; padding: 1.25rem; font-size: 1.1rem; }

        .btn-scan    { background: linear-gradient(135deg, #60a5fa, #3b82f6); color: white; border-bottom: 4px solid #1d4ed8; }
        .btn-proceed { background: linear-gradient(135deg, #f472b6, #ec4899); color: white; border-bottom: 4px solid #be185d; width: 100%; }
        .btn-back    { background: #e5e7eb; color: #374151; border-bottom: 4px solid #d1d5db; width: 100%; }
        .btn-add     { background: linear-gradient(135deg, #4ade80, #22c55e); color: white; border-bottom: 4px solid #15803d; width: 100%; }
        .btn-delete  { background: linear-gradient(135deg, #fb7185, #ef4444); color: white; padding: 0.5rem 1rem; border-radius: 0.75rem; border: none; border-bottom: 3px solid #b91c1c; cursor: pointer; font-weight: 900; font-family: inherit; }
        .btn-remove  { background: linear-gradient(135deg, #fb7185, #ef4444); color: white; padding: 0.5rem 1rem; border-radius: 0.75rem; border: none; border-bottom: 3px solid #b91c1c; cursor: pointer; font-weight: 900; font-family: inherit; }
        .btn-new-sale { background: linear-gradient(135deg, #f472b6, #ec4899); color: white; width: 100%; padding: 1.25rem; font-size: 1.1rem; font-weight: 900; border: none; border-radius: 1.25rem; border-bottom: 4px solid #be185d; cursor: pointer; margin-top: 1rem; font-family: inherit; }
        .btn-print-receipt { background: linear-gradient(135deg, #818cf8, #6366f1); color: white; width: 100%; padding: 1rem; font-size: 1rem; font-weight: 900; border: none; border-radius: 1.25rem; border-bottom: 4px solid #4338ca; cursor: pointer; margin-top: 0.5rem; font-family: inherit; }
        .btn-custom  { background: linear-gradient(135deg, #fb923c, #f97316); color: white; padding: 1.25rem; font-size: 1.05rem; font-weight: 900; width: 100%; border: none; border-radius: 1.25rem; border-bottom: 4px solid #c2410c; cursor: pointer; font-family: inherit; }

        /* Payment denomination buttons — each a fun colour */
        .btn-payment { color: white; padding: 1.25rem; font-size: 1.4rem; font-weight: 900; width: 100%; border: none; border-radius: 1.25rem; cursor: pointer; font-family: inherit; }
        .btn-pay-5  { background: linear-gradient(135deg, #4ade80, #22c55e); border-bottom: 4px solid #15803d; }
        .btn-pay-10 { background: linear-gradient(135deg, #60a5fa, #3b82f6); border-bottom: 4px solid #1d4ed8; }
        .btn-pay-20 { background: linear-gradient(135deg, #f472b6, #ec4899); border-bottom: 4px solid #be185d; }
        .btn-pay-50 { background: linear-gradient(135deg, #fb923c, #f97316); border-bottom: 4px solid #c2410c; }
        .btn-pay-other { background: linear-gradient(135deg, #a78bfa, #8b5cf6); border-bottom: 4px solid #5b21b6; }

        /* Basket qty controls */
        .basket-item { display: flex; justify-content: space-between; align-items: center; padding: 0.875rem 1rem; border-radius: 1rem; border: 3px solid; margin-bottom: 0.6rem; gap: 0.5rem; }
        .basket-item-info { flex: 1; min-width: 0; }
        .basket-item-info h3 { font-size: 0.95rem; font-weight: 900; margin: 0 0 0.15rem 0; color: #1f2937; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .basket-item-price { color: #059669; font-weight: 900; font-size: 0.9rem; }
        .basket-item-controls { display: flex; align-items: center; gap: 0.4rem; flex-shrink: 0; }
        .qty-btn { width: 36px; height: 36px; border-radius: 50%; border: none; font-size: 1.2rem; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; font-family: inherit; transition: transform 0.1s; }
        .qty-btn:active { transform: scale(0.9); }
        .qty-minus { background: #fef3c7; color: #d97706; border: 2px solid #fde047; }
        .qty-plus  { background: #dcfce7; color: #16a34a; border: 2px solid #86efac; }
        .qty-num   { min-width: 28px; text-align: center; font-size: 1rem; font-weight: 900; color: #1f2937; }
        .bin-btn   { width: 38px; height: 38px; border-radius: 50%; background: linear-gradient(135deg, #fb7185, #ef4444); border: none; border-bottom: 3px solid #b91c1c; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1rem; transition: transform 0.1s; margin-left: 0.2rem; }
        .bin-btn:active { transform: scale(0.9); }
        .total-section { border-top: 4px dashed #d8b4fe; padding-top: 1.25rem; margin-top: 1.25rem; }
        .total-amount { font-size: 3rem; font-weight: 900; background: linear-gradient(to right, #f43f5e, #f97316, #eab308); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 1.25rem; }
        .empty-message { text-align: center; color: #9ca3af; font-size: 1.1rem; padding: 2rem; font-weight: 700; }
        .hidden { display: none; }

        /* Change display */
        .change-display { background: linear-gradient(135deg, #bbf7d0, #86efac); border: 4px solid #22c55e; border-radius: 1.5rem; padding: 1.5rem; text-align: center; margin-bottom: 1.5rem; box-shadow: 0 6px 0 #15803d; }
        .change-label  { font-size: 1rem; color: #14532d; font-weight: 900; margin-bottom: 0.25rem; }
        .change-amount { font-size: 3.5rem; font-weight: 900; color: #15803d; line-height: 1; }
        .tendered-label { font-size: 0.8rem; color: #166534; margin-top: 0.5rem; font-weight: 700; }

        /* Receipt */
        .receipt { background: #fffef7; border: 3px dashed #fbbf24; border-radius: 1rem; padding: 1.25rem; font-family: 'Courier New', monospace; font-size: 0.8rem; color: #1f2937; }
        .receipt-header { text-align: center; margin-bottom: 0.75rem; }
        .receipt-shop { font-size: 1rem; font-weight: 900; letter-spacing: 1px; }
        .receipt-sub { font-size: 0.7rem; color: #6b7280; }
        .receipt-divider { border: none; border-top: 1px dashed #9ca3af; margin: 0.5rem 0; }
        .receipt-row { display: flex; justify-content: space-between; margin-bottom: 0.2rem; }
        .receipt-row.bold  { font-weight: bold; }
        .receipt-row.total { font-size: 0.95rem; font-weight: 900; }
        .receipt-row.change { color: #059669; font-weight: bold; }
        .receipt-footer { text-align: center; margin-top: 0.75rem; font-size: 0.7rem; color: #6b7280; }

        /* Camera */
        .camera-section { border-radius: 1.25rem; overflow: hidden; margin-top: 1rem; background: #000; border: 3px solid #60a5fa; }
        #scanner-container { width: 100%; }
        #scanner-container video { width: 100% !important; height: 200px !important; object-fit: cover !important; display: block !important; }
        #scanner-container > div > span,
        #scanner-container > div > img,
        #html5-qrcode-button-file-selection,
        #html5-qrcode-anchor-scan-type-change { display: none !important; }
        .close-camera-btn { background: linear-gradient(135deg, #fb7185, #ef4444); color: white; width: 100%; padding: 0.875rem; font-size: 1rem; font-weight: 900; border: none; cursor: pointer; font-family: inherit; }

        /* Admin */
        .product-item { background: linear-gradient(135deg, #fefce8, #fef9c3); padding: 1.1rem; border-radius: 1rem; border: 3px solid #fde047; margin-bottom: 0.875rem; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 3px 0 #ca8a04; }
        .product-info h3 { font-size: 1rem; font-weight: 900; margin: 0 0 0.2rem 0; }
        .product-price { color: #7c3aed; font-weight: 900; }
        .product-barcode { font-size: 0.7rem; color: #6b7280; font-family: monospace; }
        .product-actions { display: flex; gap: 0.5rem; flex-shrink: 0; }
        .btn-print { background: linear-gradient(135deg, #60a5fa, #3b82f6); color: white; padding: 0.5rem 1rem; border-radius: 0.75rem; border: none; border-bottom: 3px solid #1d4ed8; cursor: pointer; font-weight: 900; font-family: inherit; }

        /* Modal */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 1.25rem; }
        .modal-overlay.hidden { display: none; }
        .modal-box { background: white; border-radius: 2rem; padding: 2rem; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.25); border: 4px solid #fbbf24; animation: popIn 0.2s ease-out; }
        @keyframes popIn { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal-emoji { font-size: 3rem; text-align: center; margin-bottom: 0.5rem; }
        .modal-title { font-size: 1.35rem; font-weight: 900; color: #1f2937; margin-bottom: 0.3rem; text-align: center; }
        .modal-sub { font-size: 0.8rem; color: #6b7280; margin-bottom: 1.25rem; font-family: monospace; word-break: break-all; text-align: center; background: #f9fafb; padding: 0.5rem; border-radius: 0.5rem; }
        .modal-input-group { display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 1.25rem; }
        .modal-input-group input { padding: 0.875rem; border: 3px solid #e5e7eb; border-radius: 1rem; font-size: 1rem; font-family: inherit; font-weight: 700; }
        .modal-input-group input:focus { outline: none; border-color: #a78bfa; background: #faf5ff; }
        .modal-input-group label { font-size: 0.85rem; font-weight: 900; color: #374151; }
        .modal-actions { display: flex; gap: 0.75rem; }
        .modal-btn-primary   { flex: 1; padding: 1rem; background: linear-gradient(135deg, #4ade80, #22c55e); color: white; border: none; border-radius: 1.25rem; border-bottom: 4px solid #15803d; font-weight: 900; font-size: 1rem; cursor: pointer; font-family: inherit; }
        .modal-btn-secondary { flex: 1; padding: 1rem; background: #f3f4f6; color: #374151; border: none; border-radius: 1.25rem; border-bottom: 4px solid #d1d5db; font-weight: 900; font-size: 1rem; cursor: pointer; font-family: inherit; }
        .modal-btn-danger    { flex: 1; padding: 1rem; background: linear-gradient(135deg, #fb7185, #ef4444); color: white; border: none; border-radius: 1.25rem; border-bottom: 4px solid #b91c1c; font-weight: 900; font-size: 1rem; cursor: pointer; font-family: inherit; }
        .modal-btn-add       { flex: 1; padding: 1rem; background: linear-gradient(135deg, #60a5fa, #3b82f6); color: white; border: none; border-radius: 1.25rem; border-bottom: 4px solid #1d4ed8; font-weight: 900; font-size: 1rem; cursor: pointer; font-family: inherit; }
    </style>
</head>
<body>
    <div class="container">

        <div class="shop-header">
            <h1>🏪 Karim's Corner Shop</h1>
            <p>Point of Sale System</p>
        </div>

        <div class="mode-toggle">
            <button class="btn-mode active" onclick="switchMode('cashier')">🛒 Cashier</button>
            <button class="btn-mode inactive" onclick="switchMode('admin')">⚙️ Admin</button>
        </div>

        <!-- Cashier -->
        <div id="cashier" class="content active">
            <div class="card card-scan">
                <h2>🔍 Scan Items</h2>
                <div class="input-group">
                    <label style="font-weight:900;color:#374151;">Enter barcode or scan with camera:</label>
                    <input type="text" id="barcode-input" placeholder="e.g. 5000000000000" maxlength="50"
                           onkeypress="if(event.key==='Enter') scanBarcode()">
                    <div style="display:flex;gap:0.5rem;">
                        <button class="btn btn-scan btn-large" onclick="scanBarcode()">✏️ Manual Entry</button>
                        <button class="btn btn-scan btn-large" onclick="toggleCamera()" id="camera-btn">📷 Scan</button>
                    </div>
                </div>
                <div id="camera-section" class="camera-section hidden">
                    <div id="scanner-container"></div>
                    <button class="close-camera-btn" onclick="stopCamera()">✕ Close Scanner</button>
                </div>
            </div>

            <div class="card card-basket">
                <h2>🛍️ Basket</h2>
                <div id="basket-items"></div>
                <div id="empty-basket" class="empty-message">🛒 No items scanned yet</div>
                <div id="total-section" class="total-section hidden">
                    <div style="color:#6b7280;margin-bottom:0.25rem;font-size:0.85rem;font-weight:900;">TOTAL</div>
                    <div class="total-amount" id="total-display">£0.00</div>
                    <button class="btn btn-proceed btn-large" onclick="goToPayment()">💳 Proceed to Payment</button>
                </div>
            </div>
        </div>

        <!-- Payment -->
        <div id="payment" class="content">
            <div class="card card-payment" style="text-align:center;">
                <h2>💳 Payment</h2>
                <div style="background:linear-gradient(to right,#f3e8ff,#fce7f3);padding:1.5rem;border-radius:0.75rem;margin-bottom:1.5rem;">
                    <div style="color:#6b7280;margin-bottom:0.25rem;font-size:0.9rem;">AMOUNT DUE</div>
                    <div class="total-amount" id="payment-total">£0.00</div>
                </div>

                <!-- Pre-payment buttons -->
                <div id="pre-payment">
                    <div style="font-size:1rem;font-weight:900;color:#374151;margin-bottom:1rem;">💵 Cash Tendered</div>
                    <div id="payment-buttons" style="display:grid;grid-template-columns:repeat(2,1fr);gap:0.75rem;margin-bottom:0.75rem;"></div>

                    <!-- Custom amount panel -->
                    <div id="custom-panel-closed">
                        <button class="btn-custom" onclick="openCustomPanel()">✏️ Custom Amount</button>
                    </div>
                    <div id="custom-panel-open" class="hidden" style="background:#fef9c3;border:3px solid #fde047;border-radius:1.25rem;padding:1rem;margin-bottom:0.75rem;">
                        <div style="font-weight:900;font-size:0.95rem;color:#92400e;margin-bottom:0.75rem;">Enter cash amount</div>
                        <input type="number" id="custom-amount-input" placeholder="e.g. 7.50" step="0.01" min="0.01"
                               style="width:100%;margin-bottom:0.75rem;font-size:1.25rem;text-align:center;border-color:#fbbf24;"
                               onkeypress="if(event.key==='Enter') confirmCustomAmount()">
                        <div style="display:flex;gap:0.75rem;">
                            <button class="modal-btn-primary" onclick="confirmCustomAmount()">✅ Confirm</button>
                            <button class="modal-btn-secondary" onclick="closeCustomPanel()">Cancel</button>
                        </div>
                    </div>

                    <button class="btn btn-back btn-large" style="margin-top:0.75rem;" onclick="backToBasket()">← Back</button>
                </div>

                <!-- Post-payment: change + receipt -->
                <div id="post-payment" class="hidden">
                    <div class="change-display">
                        <div class="change-label">CHANGE DUE</div>
                        <div class="change-amount" id="change-display">£0.00</div>
                        <div class="tendered-label" id="tendered-display"></div>
                    </div>
                    <div class="receipt" id="receipt-area"></div>
                    <button class="btn-print-receipt" onclick="printReceipt()">🖨️ Print Receipt</button>
                    <button class="btn-new-sale" onclick="newSale()">✅ New Sale</button>
                </div>
            </div>
        </div>

        <!-- Admin -->
        <div id="admin" class="content">
            <div class="card card-admin">
                <h2>➕ Add Product</h2>
                <div class="input-group">
                    <input type="text"   id="product-name"    placeholder="Product Name">
                    <input type="text"   id="product-barcode" placeholder="Barcode / QR value (optional)">
                    <input type="number" id="product-price"   placeholder="Price (£)" step="0.01">
                    <button class="btn btn-add btn-large" onclick="addProduct()">Add Product</button>
                </div>
            </div>
            <div class="card">
                <h2>📦 Products</h2>
                <div id="products-list"></div>
            </div>
        </div>
    </div>

    <!-- Product modal -->
    <div class="modal-overlay hidden" id="product-modal">
        <div class="modal-box">
            <div class="modal-emoji" id="modal-emoji">🔍</div>
            <div class="modal-title" id="modal-title">Product Not Found</div>
            <div class="modal-sub" id="modal-sub"></div>

            <!-- Step 1: not found -->
            <div id="modal-step-notfound">
                <div class="modal-actions">
                    <button class="modal-btn-add"   onclick="modalStartManual()">✏️ Add Manually</button>
                    <button class="modal-btn-danger" onclick="closeModal()">✕ Cancel</button>
                </div>
            </div>

            <!-- Step 2: manual entry -->
            <div id="modal-step-form" class="hidden">
                <div class="modal-input-group">
                    <label>🏷️ Product Name</label>
                    <input type="text"   id="modal-name"  placeholder="e.g. Orange Juice 1L">
                    <label>💰 Price (£)</label>
                    <input type="number" id="modal-price" placeholder="e.g. 1.49" step="0.01" min="0.01">
                </div>
                <div class="modal-actions">
                    <button class="modal-btn-primary"   onclick="modalConfirmAdd()">🛒 Add to Basket</button>
                    <button class="modal-btn-secondary" onclick="closeModal()">Cancel</button>
                </div>
            </div>

            <!-- Step 3: API found — enter price -->
            <div id="modal-step-price" class="hidden">
                <div style="background:linear-gradient(135deg,#fef9c3,#fef3c7);border:3px solid #fde047;border-radius:1rem;padding:1rem;margin-bottom:1rem;text-align:left;">
                    <div style="font-size:0.7rem;font-weight:900;color:#92400e;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:0.25rem;">✅ Product Found</div>
                    <div style="font-size:0.95rem;font-weight:900;color:#1f2937;" id="modal-found-name-display"></div>
                </div>
                <div class="modal-input-group">
                    <label>💰 How much does it cost? (£)</label>
                    <input type="number" id="modal-price-only" placeholder="e.g. 1.49" step="0.01" min="0.01"
                           style="font-size:1.5rem;text-align:center;border-color:#fbbf24;background:#fefce8;"
                           onkeypress="if(event.key==='Enter') modalConfirmPrice()">
                </div>
                <div class="modal-actions">
                    <button class="modal-btn-primary"   onclick="modalConfirmPrice()">🛒 Add to Basket</button>
                    <button class="modal-btn-secondary" onclick="closeModal()">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SHOP_NAME = "Karim's Corner Shop";

        let products = JSON.parse(localStorage.getItem('tillProducts')) || [
            { id: 1, name: 'Milk',   price: 1.50, barcode: '5000000000000' },
            { id: 2, name: 'Bread',  price: 1.20, barcode: '5000000000001' },
            { id: 3, name: 'Apples', price: 0.80, barcode: '5000000000002' },
        ];

        let basket       = [];
        let cameraActive = false;
        let html5QrCode  = null;
        let lastSaleData = null;

        // ── Audio ──────────────────────────────────────────────
        function playBeep() {
            try {
                const ctx  = new (window.AudioContext || window.webkitAudioContext)();
                const osc  = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                osc.frequency.value = 800; osc.type = 'sine';
                gain.gain.setValueAtTime(0.3, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.12);
                osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.12);
            } catch (_) {}
        }

        // ── Mode ───────────────────────────────────────────────
        function switchMode(mode) {
            document.querySelectorAll('.btn-mode').forEach(btn => {
                const mine = (mode === 'cashier' && btn.textContent.includes('Cashier'))
                          || (mode === 'admin'   && btn.textContent.includes('Admin'));
                btn.classList.toggle('active', mine);
                btn.classList.toggle('inactive', !mine);
            });
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.getElementById(mode).classList.add('active');
            if (mode === 'admin') renderProducts();
        }

        // ── Camera ─────────────────────────────────────────────
        function toggleCamera() { cameraActive ? stopCamera() : startCamera(); }

        async function startCamera() {
            try {
                html5QrCode = new Html5Qrcode('scanner-container');
                document.getElementById('camera-section').classList.remove('hidden');
                document.getElementById('camera-btn').textContent = '📷 Stop';
                cameraActive = true;
                await html5QrCode.start(
                    { facingMode: 'environment' },
                    {
                        fps: 30,
                        qrbox: { width: 240, height: 90 },
                        disableFlip: true,
                        videoConstraints: {
                            facingMode: 'environment',
                            width:  { ideal: 640 },
                            height: { ideal: 480 }
                        }
                    },
                    (decodedText) => {
                        stopCamera();
                        document.getElementById('barcode-input').value = decodedText;
                        scanBarcode();
                    },
                    () => {}
                );
            } catch (err) { alert('Camera error: ' + err.message); stopCamera(); }
        }

        async function stopCamera() {
            if (html5QrCode) {
                try { await html5QrCode.stop(); } catch (_) {}
                try { html5QrCode.clear(); }     catch (_) {}
                html5QrCode = null;
            }
            document.getElementById('scanner-container').innerHTML = '';
            document.getElementById('camera-section').classList.add('hidden');
            document.getElementById('camera-btn').textContent = 'Scan';
            cameraActive = false;
        }

        // ── Modal ──────────────────────────────────────────────
        let modalBarcode = '';
        let modalFoundName = '';

        const modalEmojis = {
            'modal-step-notfound': '🤔',
            'modal-step-form':     '✏️',
            'modal-step-price':    '🎉',
        };

        function openModal(step, title, sub) {
            document.getElementById('modal-emoji').textContent = modalEmojis[step] || '🔍';
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-sub').textContent   = sub;
            ['modal-step-notfound','modal-step-form','modal-step-price'].forEach(id =>
                document.getElementById(id).classList.add('hidden')
            );
            document.getElementById(step).classList.remove('hidden');
            document.getElementById('product-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('product-modal').classList.add('hidden');
            document.getElementById('modal-name').value        = '';
            document.getElementById('modal-price').value       = '';
            document.getElementById('modal-price-only').value  = '';
            modalBarcode = ''; modalFoundName = '';
            document.getElementById('barcode-input').placeholder = 'e.g. 5000000000000';
            document.getElementById('barcode-input').disabled    = false;
            document.getElementById('barcode-input').focus();
        }

        function modalStartManual() {
            document.getElementById('modal-step-notfound').classList.add('hidden');
            document.getElementById('modal-step-form').classList.remove('hidden');
            document.getElementById('modal-title').textContent = '✏️ Add Product';
            document.getElementById('modal-emoji').textContent = '✏️';
            setTimeout(() => document.getElementById('modal-name').focus(), 50);
        }

        function modalConfirmAdd() {
            const name  = document.getElementById('modal-name').value.trim();
            const price = parseFloat(document.getElementById('modal-price').value);
            if (!name)               { document.getElementById('modal-name').focus();  return; }
            if (!price || price <= 0){ document.getElementById('modal-price').focus(); return; }
            const newId = Math.max(...products.map(p => p.id), 0) + 1;
            const prod  = { id: newId, name, price, barcode: modalBarcode };
            products.push(prod);
            localStorage.setItem('tillProducts', JSON.stringify(products));
            playBeep();
            addToBasket(prod);
            document.getElementById('barcode-input').value = '';
            closeModal();
        }

        function modalConfirmPrice() {
            const price = parseFloat(document.getElementById('modal-price-only').value);
            if (!price || price <= 0){ document.getElementById('modal-price-only').focus(); return; }
            const newId = Math.max(...products.map(p => p.id), 0) + 1;
            const prod  = { id: newId, name: modalFoundName, price, barcode: modalBarcode };
            products.push(prod);
            localStorage.setItem('tillProducts', JSON.stringify(products));
            playBeep();
            addToBasket(prod);
            document.getElementById('barcode-input').value = '';
            closeModal();
        }

        // ── Barcode lookup ─────────────────────────────────────
        async function scanBarcode() {
            const barcode = document.getElementById('barcode-input').value.trim();
            if (!barcode) return;

            const local = products.find(p => p.barcode === barcode);
            if (local) {
                playBeep();
                addToBasket(local);
                document.getElementById('barcode-input').value = '';
                return;
            }

            document.getElementById('barcode-input').placeholder = 'Looking up…';
            document.getElementById('barcode-input').disabled = true;
            try {
                const res  = await fetch(`https://world.openfoodfacts.org/api/v0/product/${barcode}.json`);
                const data = await res.json();
                if (data.status === 1 && data.product) {
                    const p        = data.product;
                    const name     = p.product_name || p.abbreviated_product_name || p.generic_name || 'Unknown Product';
                    const brand    = p.brands ? ' (' + p.brands.split(',')[0].trim() + ')' : '';
                    modalBarcode   = barcode;
                    modalFoundName = name + brand;
                    openModal('modal-step-price', '🎉 Product Found!', '');
                    document.getElementById('modal-found-name-display').textContent = modalFoundName;
                    setTimeout(() => document.getElementById('modal-price-only').focus(), 50);
                } else {
                    modalBarcode = barcode;
                    openModal('modal-step-notfound', 'Product Not Found', 'Barcode: ' + barcode);
                }
            } catch (err) {
                modalBarcode = barcode;
                openModal('modal-step-notfound', 'Network Error — Add Manually?', 'Barcode: ' + barcode);
            }
        }

        // ── Basket ─────────────────────────────────────────────
        const BASKET_COLOURS = [
            { bg: '#fff1f2', border: '#fda4af' },
            { bg: '#fefce8', border: '#fde047' },
            { bg: '#f0fdf4', border: '#86efac' },
            { bg: '#eff6ff', border: '#93c5fd' },
            { bg: '#fdf4ff', border: '#d8b4fe' },
        ];

        function addToBasket(prod) {
            const existing = basket.find(i => i.id === prod.id);
            if (existing) { existing.qty++; }
            else { basket.push({ ...prod, qty: 1 }); }
            renderBasket();
        }

        function increaseQty(id) {
            const item = basket.find(i => i.id === id);
            if (item) { item.qty++; renderBasket(); }
        }

        function decreaseQty(id) {
            const item = basket.find(i => i.id === id);
            if (!item) return;
            item.qty--;
            if (item.qty <= 0) basket = basket.filter(i => i.id !== id);
            renderBasket();
        }

        function removeItem(id) {
            basket = basket.filter(i => i.id !== id);
            renderBasket();
        }

        function renderBasket() {
            const container    = document.getElementById('basket-items');
            const emptyMsg     = document.getElementById('empty-basket');
            const totalSection = document.getElementById('total-section');
            if (basket.length === 0) {
                container.innerHTML = '';
                emptyMsg.classList.remove('hidden');
                totalSection.classList.add('hidden');
                return;
            }
            emptyMsg.classList.add('hidden');
            totalSection.classList.remove('hidden');
            container.innerHTML = basket.map((item, idx) => {
                const c = BASKET_COLOURS[idx % BASKET_COLOURS.length];
                const lineTotal = (item.price * item.qty).toFixed(2);
                return `
                <div class="basket-item" style="background:${c.bg};border-color:${c.border};">
                    <div class="basket-item-info">
                        <h3>${item.name}</h3>
                        <div class="basket-item-price">£${item.price.toFixed(2)} × ${item.qty} = £${lineTotal}</div>
                    </div>
                    <div class="basket-item-controls">
                        <button class="qty-btn qty-minus" onclick="decreaseQty(${item.id})">−</button>
                        <span class="qty-num">${item.qty}</span>
                        <button class="qty-btn qty-plus"  onclick="increaseQty(${item.id})">+</button>
                        <button class="bin-btn" onclick="removeItem(${item.id})" title="Remove">🗑️</button>
                    </div>
                </div>`;
            }).join('');
            const total = basket.reduce((s, i) => s + i.price * i.qty, 0);
            document.getElementById('total-display').textContent = '£' + total.toFixed(2);
        }

        // ── Payment ────────────────────────────────────────────
        function goToPayment() {
            const total = basket.reduce((s, i) => s + i.price * i.qty, 0);
            document.getElementById('payment-total').textContent = '£' + total.toFixed(2);
            const colourMap = { 5: 'btn-pay-5', 10: 'btn-pay-10', 20: 'btn-pay-20', 50: 'btn-pay-50' };
            const opts = [5, 10, 20, 50].filter(o => o >= Math.ceil(total));
            document.getElementById('payment-buttons').innerHTML =
                opts.map(amt => `<button class="btn-payment ${colourMap[amt]||'btn-pay-other'}" onclick="processCash(${amt})">💵 £${amt}</button>`).join('');
            document.getElementById('pre-payment').classList.remove('hidden');
            document.getElementById('post-payment').classList.add('hidden');
            document.getElementById('cashier').classList.remove('active');
            document.getElementById('payment').classList.add('active');
        }

        function backToBasket() {
            closeCustomPanel();
            document.getElementById('payment').classList.remove('active');
            document.getElementById('cashier').classList.add('active');
        }

        function openCustomPanel() {
            document.getElementById('custom-panel-closed').classList.add('hidden');
            document.getElementById('custom-panel-open').classList.remove('hidden');
            setTimeout(() => document.getElementById('custom-amount-input').focus(), 50);
        }

        function closeCustomPanel() {
            document.getElementById('custom-amount-input').value = '';
            document.getElementById('custom-panel-open').classList.add('hidden');
            document.getElementById('custom-panel-closed').classList.remove('hidden');
        }

        function confirmCustomAmount() {
            const total  = basket.reduce((s, i) => s + i.price * i.qty, 0);
            const amount = parseFloat(document.getElementById('custom-amount-input').value);
            if (isNaN(amount) || amount <= 0) {
                document.getElementById('custom-amount-input').focus(); return;
            }
            if (amount < total) {
                document.getElementById('custom-amount-input').style.borderColor = '#ef4444';
                document.getElementById('custom-amount-input').focus(); return;
            }
            closeCustomPanel();
            processCash(amount);
        }

        function processCash(amount) {
            const total  = basket.reduce((s, i) => s + i.price * i.qty, 0);
            const change = amount - total;

            lastSaleData = {
                items: [...basket],
                total,
                tendered: amount,
                change,
                time: new Date()
            };

            // Show change
            document.getElementById('change-display').textContent = '£' + change.toFixed(2);
            document.getElementById('tendered-display').textContent =
                `Cash tendered: £${amount.toFixed(2)}  |  Total: £${total.toFixed(2)}`;

            // Build receipt
            buildReceipt(lastSaleData);

            document.getElementById('pre-payment').classList.add('hidden');
            document.getElementById('post-payment').classList.remove('hidden');

            playBeep();
        }

        function buildReceipt(sale) {
            const dt = sale.time;
            const dateStr = dt.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
            const timeStr = dt.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
            const itemCount = sale.items.reduce((s, i) => s + i.qty, 0);

            let rows = sale.items.map(i => {
                const line = (i.price * i.qty).toFixed(2);
                const qtyLabel = i.qty > 1 ? ` ×${i.qty}` : '';
                return `<div class="receipt-row">
                    <span style="flex:1;padding-right:0.5rem;word-break:break-word;">${i.name}${qtyLabel}</span>
                    <span style="white-space:nowrap;">£${line}</span>
                </div>`;
            }).join('');

            document.getElementById('receipt-area').innerHTML = `
                <div class="receipt-header">
                    <div class="receipt-shop">${SHOP_NAME.toUpperCase()}</div>
                    <div class="receipt-sub">Thank you for shopping with us</div>
                    <div class="receipt-sub" style="margin-top:0.25rem;">${dateStr} &nbsp; ${timeStr}</div>
                </div>
                <hr class="receipt-divider">
                ${rows}
                <hr class="receipt-divider">
                <div class="receipt-row bold">
                    <span>${itemCount} ITEM${itemCount !== 1 ? 'S' : ''}</span>
                    <span></span>
                </div>
                <div class="receipt-row total">
                    <span>TOTAL</span>
                    <span>£${sale.total.toFixed(2)}</span>
                </div>
                <div class="receipt-row">
                    <span>CASH</span>
                    <span>£${sale.tendered.toFixed(2)}</span>
                </div>
                <div class="receipt-row change">
                    <span>CHANGE</span>
                    <span>£${sale.change.toFixed(2)}</span>
                </div>
                <hr class="receipt-divider">
                <div class="receipt-footer">
                    <div>*** THANK YOU ***</div>
                    <div style="margin-top:0.25rem;">Please keep receipt as proof of purchase</div>
                    <div style="margin-top:0.25rem;">Powered by Karim's Corner Shop POS</div>
                </div>
            `;
        }

        function printReceipt() {
            if (!lastSaleData) return;
            const dt       = lastSaleData.time;
            const dateStr  = dt.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
            const timeStr  = dt.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
            const itemRows = lastSaleData.items.map(i => {
                const line = (i.price * i.qty).toFixed(2);
                const qtyLabel = i.qty > 1 ? ` ×${i.qty}` : '';
                return `<tr><td>${i.name}${qtyLabel}</td><td style="text-align:right">£${line}</td></tr>`;
            }).join('');

            const pw = window.open('', '', 'width=320,height=600');
            pw.document.write(`
                <html><head><title>Receipt</title><style>
                    body { font-family: 'Courier New', monospace; font-size: 12px; padding: 1rem; max-width: 280px; margin: 0 auto; }
                    h1 { text-align: center; font-size: 14px; margin-bottom: 0; }
                    .sub { text-align: center; font-size: 10px; color: #666; }
                    hr { border: none; border-top: 1px dashed #999; margin: 6px 0; }
                    table { width: 100%; }
                    td { padding: 1px 0; }
                    .total-row td { font-weight: bold; font-size: 13px; border-top: 1px dashed #999; padding-top: 4px; }
                    .change-row td { color: green; font-weight: bold; }
                    .footer { text-align: center; font-size: 10px; color: #666; margin-top: 8px; }
                </style></head><body>
                <h1>${SHOP_NAME.toUpperCase()}</h1>
                <p class="sub">Thank you for shopping with us</p>
                <p class="sub">${dateStr} &nbsp; ${timeStr}</p>
                <hr>
                <table>${itemRows}</table>
                <table>
                    <tr class="total-row"><td>TOTAL</td><td style="text-align:right">£${lastSaleData.total.toFixed(2)}</td></tr>
                    <tr><td>CASH</td><td style="text-align:right">£${lastSaleData.tendered.toFixed(2)}</td></tr>
                    <tr class="change-row"><td>CHANGE</td><td style="text-align:right">£${lastSaleData.change.toFixed(2)}</td></tr>
                </table>
                <hr>
                <p class="footer">*** THANK YOU ***<br>Please keep as proof of purchase</p>
                <script>setTimeout(()=>window.print(),300)<\/script>
                </body></html>
            `);
            pw.document.close();
        }

        function newSale() {
            basket = [];
            lastSaleData = null;
            renderBasket();
            document.getElementById('payment').classList.remove('active');
            document.getElementById('cashier').classList.add('active');
        }

        // ── Admin ──────────────────────────────────────────────
        function addProduct() {
            const name    = document.getElementById('product-name').value.trim();
            const barcode = document.getElementById('product-barcode').value.trim()
                          || ('500000' + Math.random().toString().slice(2, 9));
            const price   = parseFloat(document.getElementById('product-price').value);
            if (!name || !price || price <= 0) { alert('Enter valid details'); return; }
            const newId = Math.max(...products.map(p => p.id), 0) + 1;
            products.push({ id: newId, name, price, barcode });
            localStorage.setItem('tillProducts', JSON.stringify(products));
            document.getElementById('product-name').value    = '';
            document.getElementById('product-barcode').value = '';
            document.getElementById('product-price').value   = '';
            renderProducts();
        }

        function deleteProduct(id) {
            products = products.filter(p => p.id !== id);
            localStorage.setItem('tillProducts', JSON.stringify(products));
            renderProducts();
        }

        function printBarcode(product) {
            const pw = window.open('', '', 'width=400,height=300');
            pw.document.write(
                '<html><head><title>Barcode</title>' +
                '<style>body{text-align:center;padding:20px;font-family:sans-serif}</style></head>' +
                '<body><h3>' + product.name + '</h3><svg id="bc"></svg>' +
                '<p style="margin-top:0.5rem">£' + product.price.toFixed(2) + '</p>' +
                '<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"><\/script>' +
                '<script>JsBarcode("#bc","' + product.barcode + '",{displayValue:true});<\/script>' +
                '</body></html>'
            );
            pw.document.close();
            setTimeout(() => pw.print(), 250);
        }

        function renderProducts() {
            document.getElementById('products-list').innerHTML = products.length === 0
                ? '<p style="color:#9ca3af;text-align:center;padding:1rem;">No products yet</p>'
                : products.map(p => `
                <div class="product-item">
                    <div class="product-info">
                        <h3>${p.name}</h3>
                        <div class="product-price">£${p.price.toFixed(2)}</div>
                        <div class="product-barcode">${p.barcode}</div>
                    </div>
                    <div class="product-actions">
                        <button class="btn-print" onclick='printBarcode(${JSON.stringify(p)})'>Print</button>
                        <button class="btn-delete" onclick="deleteProduct(${p.id})">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        renderBasket();
        renderProducts();
    </script>
</body>
</html>
